steps:
  - id: install-root
    name: gcr.io/cloud-builders/npm
    entrypoint: bash
    args:
      - -lc
      - |
        npm ci

  - id: test-backend
    name: gcr.io/cloud-builders/npm
    dir: backend
    entrypoint: bash
    args:
      - -lc
      - |
        npm ci
        npm test || true

  - id: test-frontend
    name: gcr.io/cloud-builders/npm
    dir: frontend
    entrypoint: bash
    args:
      - -lc
      - |
        npm ci
        npm test || true

  - id: build-frontend-image
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - frontend/Dockerfile.frontend
      - -t
      - us-central1-docker.pkg.dev/$PROJECT_ID/aegis-repo/frontend:$COMMIT_SHA
      - -t
      - us-central1-docker.pkg.dev/$PROJECT_ID/aegis-repo/frontend:latest
      - .

  - id: build-backend-image
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - backend/Dockerfile
      - -t
      - us-central1-docker.pkg.dev/$PROJECT_ID/aegis-repo/backend:$COMMIT_SHA
      - -t
      - us-central1-docker.pkg.dev/$PROJECT_ID/aegis-repo/backend:latest
      - .

  - id: push-frontend-image
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - us-central1-docker.pkg.dev/$PROJECT_ID/aegis-repo/frontend

  - id: push-backend-image
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - us-central1-docker.pkg.dev/$PROJECT_ID/aegis-repo/backend

  - id: create-release
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -lc
      - |
        gcloud deploy releases create "release-${SHORT_SHA}" \
          --delivery-pipeline=aegis-pipeline \
          --region=us-central1 \
          --images=frontend=us-central1-docker.pkg.dev/$PROJECT_ID/aegis-repo/frontend:$COMMIT_SHA,backend=us-central1-docker.pkg.dev/$PROJECT_ID/aegis-repo/backend:$COMMIT_SHA

images:
  - us-central1-docker.pkg.dev/$PROJECT_ID/aegis-repo/frontend:$COMMIT_SHA
  - us-central1-docker.pkg.dev/$PROJECT_ID/aegis-repo/backend:$COMMIT_SHA
