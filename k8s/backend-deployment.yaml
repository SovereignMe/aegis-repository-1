apiVersion: apps/v1
kind: Deployment
metadata:
  name: aegis-backend
  namespace: aegis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aegis-backend
  template:
    metadata:
      labels:
        app: aegis-backend
    spec:
      nodeSelector:
        cloud.google.com/compute-class: web-flex
      containers:
        - name: backend
          image: backend
          ports:
            - containerPort: 3001
          readinessProbe:
            httpGet:
              path: /ready
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ready
              port: 3001
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "250m"
              memory: "512Mi"