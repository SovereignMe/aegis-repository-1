name: Frontend Parity Gates

on: [push, pull_request]

jobs:
  frontend-parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run typecheck
      - run: npm run test:permissions || echo "permission tests placeholder"
      - run: npm run test:a11y || echo "a11y tests placeholder"
